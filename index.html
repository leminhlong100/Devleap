<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/images/favicon.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#6c5ce7" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Devleap — Học lập trình & tiếng Anh như chơi một game. Lộ trình rõ ràng, công cụ thực hành, streak giữ lửa." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Devleap" />
    <!-- Font self-host (Bước 3.3): preload 2 subset dùng ngay ở màn đầu (latin cho
         UI tiếng Anh, vietnamese cho chữ có dấu) — @font-face khai trong base.css.
         Không còn preconnect/link tới fonts.googleapis.com: offline vẫn có font. -->
    <link rel="preload" href="/fonts/plus-jakarta-sans-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/plus-jakarta-sans-vietnamese.woff2" as="font" type="font/woff2" crossorigin />
    <title>Devleap — Nền tảng học lập trình & tiếng Anh</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('devleap:theme')
          var theme =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.setAttribute('data-theme', theme)
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
